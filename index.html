function detectLang() {
  const raw = (navigator.language || navigator.userLanguage || 'es').toLowerCase();
  return raw.startsWith('en') ? 'en' : 'es';
}
function t(lang, key) {
  return (DICT[lang] && DICT[lang][key]) || (DICT.es && DICT.es[key]) || key;
}
function normalizeText(value) {
  return String(value || "")
    .normalize('NFD')
    .replace(/[̀-ͯ]/g, '')
    .toLowerCase()
    .trim();
}
function useViewport() {
  const [width, setWidth] = useState(window.innerWidth);
  useEffect(() => {
    const onResize = () => setWidth(window.innerWidth);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return { width, isMobile: width < 768, isTablet: width < 1024 };
}
function mapTypeLabel(value, lang) {
  if (value === "En Venta") return t(lang, "for_sale");
  if (value === "Alquiler") return t(lang, "for_rent");
  return value;
}
function getPropertyCategories(lang) {
  const original = ["Casa", "Apartamento", "Terreno"];
  const dynamic = [...new Set(PROPERTIES.map(p => p.category).filter(Boolean))];
  const categories = [...new Set([...original, ...dynamic])];
  return [t(lang, "all"), ...categories];
}
function getLocationOptions(lang) {

  ];
}
function priceMatches(priceText, filter) {
  const num = Number(String(priceText).replace(/[^\d]/g, ""));
  if (!filter || ["Cualquier precio","Any price","Sin límite","No limit"].includes(filter)) return true;
  if (["Menos de L 1,000,000","Under L 1,000,000"].includes(filter)) return num < 1000000;
  if (["L 1M – L 5M"].includes(filter)) return num >= 1000000 && num <= 5000000;
  if (["Más de L 5M","Over L 5M"].includes(filter)) return num > 5000000;
  if (["Hasta L 25,000","Up to L 25,000"].includes(filter)) return num <= 25000;
  if (["L 25,001 – L 100,000"].includes(filter)) return num >= 25001 && num <= 100000;
  return true;
}
function getWhatsAppLink(property, lang) {
  const phone = "50487647340";
  const msg = lang === "en"
    ? `Hello, I would like information about ${property.title} - ${property.location}.`
    : `Hola, quiero información sobre ${property.title} - ${property.location}.`;
  return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
}

function HomePage({ navigate, lang = "es", onSearch }) {
  const { isMobile, isTablet } = useViewport();

  const [searchLoc, setSearchLoc] = useState(t(lang, "all_zones"));
  const [searchPrice, setSearchPrice] = useState(t(lang, "any_price"));
  const [count, setCount] = useState({ props: 0, clients: 0, years: 0, rate: 0 });

  useEffect(() => {
    const targets = { props: 500, clients: 1200, years: 15, rate: 98 };
    const duration = 2000; const steps = 60; let step = 0;
    const timer = setInterval(() => {
      step++;
      const ratio = step / steps;
      setCount({ props: Math.round(targets.props * ratio), clients: Math.round(targets.clients * ratio), years: Math.round(targets.years * ratio), rate: Math.round(targets.rate * ratio) });
      if (step >= steps) clearInterval(timer);
    }, duration / steps);
    return () => clearInterval(timer);
  }, []);

  useEffect(() => {
    setHeroTab(t(lang, "for_sale"));
    setSearchType(t(lang, "all"));
    setSearchLoc(t(lang, "all_zones"));
    setSearchPrice(t(lang, "any_price"));

function PropiedadesPage({ navigate, lang = "es", initialFilters }) {
  const { isMobile, isTablet } = useViewport();
  const [filterType, setFilterType] = useState(initialFilters?.type || t(lang, "all"));
  const [filterLoc, setFilterLoc] = useState(initialFilters?.location || t(lang, "all_zones"));
  const [filterTx, setFilterTx] = useState(initialFilters?.tx || t(lang, "all"));
  const [filterPrice, setFilterPrice] = useState(initialFilters?.price || t(lang, "any_price"));
  const [viewMode, setViewMode] = useState("grid");

  useEffect(() => {
    setFilterType(initialFilters?.type || t(lang, "all"));
    setFilterLoc(initialFilters?.location || t(lang, "all_zones"));
    setFilterTx(initialFilters?.tx || t(lang, "all"));
    setFilterPrice(initialFilters?.price || t(lang, "any_price"));
  }, [initialFilters, lang]);

  const filtered = PROPERTIES.filter(p => {
    if (![t(lang, "all"), "Todos", "All"].includes(filterType) && p.category !== filterType) return false;
    if (![t(lang, "all_zones"), "Todas", "All areas", "Todas las zonas"].includes(filterLoc)) {
      const haystack = normalizeText(`${p.location} ${p.locationShort || ""}`);
      const needle = normalizeText(filterLoc);
      if (!haystack.includes(needle)) return false;
    }
    if (![t(lang, "all"), "Todos", "All"].includes(filterTx)) {
      const tx = filterTx === "For Sale" ? "En Venta" : filterTx === "Rent" ? "Alquiler" : filterTx;
      if (p.type !== tx) return false;
    }
    if (!priceMatches(p.price, filterPrice)) return false;
    return true;
  });

  return (
    <div>
      <div style={{ paddingTop: 64 }}>
        <div style={{ position: "relative", height: 240, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <img src="https://images.unsplash.com/photo-1448630360428-65456885c650?w=1400&auto=format&fit=crop" alt="bg" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }} />
          <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.5)" }} />
          <div style={{ position: "relative", textAlign: "center" }}>
            <h1 style={{ fontFamily: "Georgia, serif", fontSize: isMobile ? 38 : 52, fontWeight: 700, color: "#fff", margin: "0 0 8px" }}>{t(lang, "nav_properties")}</h1>
            <p style={{ fontFamily: "sans-serif", fontSize: 16, color: "rgba(255,255,255,0.85)", margin: 0 }}>{lang === "en" ? "Find your ideal property in Honduras" : "Encuentra tu propiedad ideal en Honduras"}</p>
          </div>
        </div>
      </div>

      <div style={{ background: "#fff", borderBottom: "1px solid #eee", padding: isMobile ? "24px 16px" : "24px 48px" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", display: "grid", gridTemplateColumns: isMobile ? "1fr" : isTablet ? "1fr 1fr" : "repeat(4,1fr)", gap: 20 }}>
          {[
            { label: t(lang, "type"), val: filterType, set: setFilterType, opts: getPropertyCategories(lang) },
            { label: t(lang, "location"), val: filterLoc, set: setFilterLoc, opts: getLocationOptions(lang) },
            { label: lang === "en" ? "Transaction" : "Transacción", val: filterTx, set: setFilterTx, opts: [t(lang, "all"), t(lang, "for_sale"), t(lang, "for_rent")] },
            { label: lang === "en" ? "Price" : "Precio", val: filterPrice, set: setFilterPrice, opts: [t(lang, "any_price"), t(lang, "less_25k"), t(lang, "between_25_100k"), t(lang, "under_1m"), t(lang, "between_1_5m"), t(lang, "over_5m")] }
          ].map(f => (
            <div key={f.label}>
              <label style={{ display: "block", fontSize: 12, fontFamily: "sans-serif", color: "#888", marginBottom: 6 }}>{f.label}</label>
              <div style={{ position: "relative" }}>
                <select value={f.val} onChange={e => f.set(e.target.value)}
                  style={{ width: "100%", padding: "10px 36px 10px 14px", border: "1px solid #ddd", borderRadius: 8, fontFamily: "sans-serif", fontSize: 14, appearance: "none", cursor: "pointer", background: "#fafafa" }}>
                  {f.opts.map(o => <option key={o}>{o}</option>)}
                </select>
                <div style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", pointerEvents: "none" }}><Icon name="chevron" size={16} color="#888" /></div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: 1200, margin: "0 auto", padding: isMobile ? "24px 16px" : "32px 48px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
          <p style={{ fontFamily: "sans-serif", fontSize: 15, color: "#555", margin: 0 }}><strong style={{ color: "#111" }}>{filtered.length}</strong> {lang === "en" ? "properties found" : "propiedades encontradas"}</p>
          <div style={{ display: "flex", gap: 4 }}>
            {[["grid","grid"],["list","list"]].map(([m, icon]) => (
              <button key={m} onClick={() => setViewMode(m)} style={{ padding: "8px 10px", border: `1px solid ${viewMode === m ? G : "#ddd"}`, borderRadius: 8, background: viewMode === m ? G : "#fff", cursor: "pointer", display: "flex", alignItems: "center" }}>
                <Icon name={icon} size={16} color={viewMode === m ? "#fff" : "#666"} />
              </button>
            ))}
          </div>
        </div>
        {viewMode === "grid" ? (
          <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : isTablet ? "repeat(2,1fr)" : "repeat(3,1fr)", gap: 28 }}>
            {filtered.map(p => <PropCard key={p.id} p={p} navigate={navigate} lang={lang} />)}
          </div>
        ) : (
          <div>{filtered.map(p => <PropCard key={p.id} p={p} navigate={navigate} list lang={lang} />)}</div>
        )}
      </div>
      <Footer navigate={navigate} lang={lang} />
    </div>
  );
}

              style={{ width: "100%", height: "100%", border: "none" }}
            />
            <a href={`https://maps.google.com/?q=${encodeURIComponent(p.location)}`} target="_blank" rel="noopener noreferrer"
              style={{ position: "absolute", top: 12, right: 12, background: "#fff", border: "1px solid #ddd", borderRadius: 8, padding: "8px 14px", fontFamily: "sans-serif", fontSize: 13, color: "#333", textDecoration: "none", display: "flex", alignItems: "center", gap: 6 }}>
              Open in Maps ↗
            </a>
          </div>
        </div>

        {/* Similar */}
        {similar.length > 0 && (
          <div style={{ maxWidth: 1200, margin: "0 auto", padding: isMobile ? "0 16px 56px" : "0 48px 80px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
              <h3 style={{ fontFamily: "Georgia, serif", fontSize: 28, fontWeight: 700, color: "#111", margin: 0 }}>{t(lang, "similar_properties")}</h3>
              <button onClick={() => navigate("propiedades")} style={{ background: "none", border: "none", cursor: "pointer", color: G, fontFamily: "sans-serif", fontSize: 14, fontWeight: 600 }}>Ver todas</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 24 }}>
              {similar.map(sp => <PropCard key={sp.id} p={sp} navigate={navigate} />)}
            </div>
          </div>
        )}
      </div>
      <Footer navigate={navigate} lang={lang} />
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function App() {
  const [page, setPage] = useState("home");
  const [selected, setSelected] = useState(null);
  const [searchFilters, setSearchFilters] = useState(null);
  const [lang, setLang] = useState(detectLang());

  useEffect(() => {
    document.documentElement.lang = lang;
    document.title = lang === "en" ? "Natural Homes HN | Real Estate" : "Natural Homes HN | Bienes Raíces";
    const meta = document.querySelector('meta[name="description"]');
    if (meta) meta.setAttribute("content", lang === "en" ? "Natural Homes HN - Real estate in Honduras" : "Natural Homes HN - Bienes raíces en Honduras");
  }, [lang]);

  const navigate = (p, prop = null) => {
    setPage(p);
    setSelected(prop);
    window.scrollTo?.({ top: 0, behavior: "smooth" });
  };

  const isHome = page === "home";

  return (
    <div style={{ minHeight: "100vh", background: "#fff", overflowX: "hidden" }}>
      <style>{`
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #root { width: 100%; overflow-x: hidden; }
        @keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(8px)} }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #2A5C14; border-radius: 3px; }
        input::placeholder, textarea::placeholder { color: #aaa; }
        select option { color: #000; background: #fff; }
        img { max-width: 100%; }
      `}</style>
      <Navbar page={page} navigate={navigate} transparent={isHome} lang={lang} />
      {page === "home" && <HomePage navigate={navigate} lang={lang} onSearch={setSearchFilters} />}
      {page === "propiedades" && <PropiedadesPage navigate={navigate} lang={lang} initialFilters={searchFilters} />}
      {page === "nosotros" && <NosotrosPage navigate={navigate} lang={lang} />}
      {page === "servicios" && <ServiciosPage navigate={navigate} lang={lang} />}
      {page === "testimonios" && <TestimoniosPage navigate={navigate} lang={lang} />}
      {page === "contacto" && <ContactoPage navigate={navigate} lang={lang} />}
      {page === "propiedad" && selected && <PropiedadPage property={selected} navigate={navigate} lang={lang} />}
    </div>
  );
}



const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
